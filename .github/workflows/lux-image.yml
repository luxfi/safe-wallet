name: Lux Safe Image

# Builds the Lux-branded Safe{Wallet} web app and pushes it to
# ghcr.io/luxfi/lux-safe. Canonical luxfi pattern: lux-build ARC pool,
# multi-arch, semver-only tags, no :latest.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish, e.g. v2.1.0'
        required: true
        type: string
  push:
    tags: ['lux-v*']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: lux-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GHCR
        # The ghcr.io/luxfi/lux-safe package predates this repo and is linked to
        # no repository, so the repo-scoped GITHUB_TOKEN cannot write it. Use the
        # org-admin GHCR_PAT (write:packages) instead.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hanzo-dev
          password: ${{ secrets.GHCR_PAT }}

      - name: Resolve image tag
        id: tag
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "value=${RAW#lux-}" >> "$GITHUB_OUTPUT"

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lux
          # lux-k8s nodes are all amd64 and only an amd64 ARC runner exists;
          # a Node/Next build cannot cross-compile (unlike the Go CGW), so an
          # arm64 leg would run under QEMU emulation — slow and OOM-prone.
          # Build amd64 natively. Revisit if an arm64 runner comes online.
          platforms: linux/amd64
          push: true
          tags: ghcr.io/luxfi/lux-safe:${{ steps.tag.outputs.value }}
          provenance: false
          cache-from: type=registry,ref=ghcr.io/luxfi/lux-safe:buildcache
          cache-to: type=registry,ref=ghcr.io/luxfi/lux-safe:buildcache,mode=max
