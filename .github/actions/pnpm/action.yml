name: 'pnpm'

description: 'Set up Node.js + pnpm and install workspace dependencies'

inputs:
  after-install:
    description: 'Run web after-install step to generate contract types'
    required: false
    default: 'true'
  turbo-token:
    description: 'Turborepo remote cache token (Vercel PAT)'
    required: false
    default: ''
  turbo-team:
    description: 'Turborepo remote cache team slug'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: ./.github/actions/corepack

    - name: Set up pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: 9.15.0
        run_install: false

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24.14.0'
        cache: 'pnpm'

    - name: Export Turbo remote cache env
      if: inputs.turbo-token != ''
      shell: bash
      run: |
        echo "TURBO_TOKEN=${{ inputs.turbo-token }}" >> "$GITHUB_ENV"
        echo "TURBO_TEAM=${{ inputs.turbo-team }}" >> "$GITHUB_ENV"
        echo "TURBO_REMOTE_ONLY=false" >> "$GITHUB_ENV"

    - name: Restore pnpm cache & generated types
      id: restore-pnpm-types
      uses: ./.github/actions/cache-deps
      with:
        mode: restore-pnpm

    - name: Echo cache hit
      shell: bash
      run: |
        echo "pnpm cache hit: ${{ steps.restore-pnpm-types.outputs.cache-hit-pnpm }}"

    - name: pnpm install
      if: steps.restore-pnpm-types.outputs.cache-hit-pnpm != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: pnpm after-install — generate contracts types
      if: steps.restore-pnpm-types.outputs.cache-hit-pnpm != 'true' && inputs.after-install == 'true'
      shell: bash
      run: pnpm --filter @safe-global/web run after-install

    - name: Save pnpm cache & types
      if: steps.restore-pnpm-types.outputs.cache-hit-pnpm != 'true'
      uses: ./.github/actions/cache-deps
      with:
        mode: save-pnpm
        key: ${{ steps.restore-pnpm-types.outputs.computed-cache-key-pnpm }}
